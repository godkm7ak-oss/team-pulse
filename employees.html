<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#3B4FCA">
  <title>TeamPulse — Employees</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="app">
  <main class="container" id="root"></main>

  <!-- Add employee modal -->
  <div class="modal-overlay" id="add-modal">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <div class="modal-title" data-i18n="Add employee">Add employee</div>
        <button class="icon-btn" onclick="UI.closeModal('add-modal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="card" style="background: var(--primary-light); border-color: transparent; padding: 14px; margin-bottom: 14px;">
          <div class="text-sm" style="color: var(--primary); font-weight: 600;" data-i18n="Share join code">Share join code</div>
          <div class="text-xs text-muted mt-1" data-i18n="Send this code to your team to let them join">Send this code to your team to let them join</div>
          <div class="flex items-center gap-2 mt-3">
            <input class="form-input" id="join-code-display" readonly style="font-family: monospace; text-align: center; font-weight: 800; font-size: 18px; letter-spacing: 3px;">
            <button class="btn btn-primary btn-sm" onclick="copyCode()" data-i18n="Copy">Copy</button>
          </div>
        </div>

        <div class="section-title">Or add directly</div>
        <form id="add-form">
          <div class="form-group">
            <label class="form-label" data-i18n="Full Name">Full Name</label>
            <input class="form-input" type="text" name="name" required>
          </div>
          <div class="form-group">
            <label class="form-label" data-i18n="Email">Email</label>
            <input class="form-input" type="email" name="email" required>
          </div>
          <div class="form-group">
            <label class="form-label" data-i18n="Employee Code">Employee Code</label>
            <input class="form-input" type="text" name="password" required minlength="4" placeholder="EMP001" style="font-family: monospace; letter-spacing: 1px; text-transform: uppercase;">
            <div class="form-help" data-i18n="Share email + code with employee to let them log in">Share email + code with employee to let them log in</div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" data-i18n="Position">Position</label>
              <input class="form-input" type="text" name="position">
            </div>
            <div class="form-group">
              <label class="form-label" data-i18n="Department">Department</label>
              <input class="form-input" type="text" name="department">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" data-i18n="Phone">Phone</label>
              <input class="form-input" type="tel" name="phone">
            </div>
            <div class="form-group">
              <label class="form-label" data-i18n="Role">Role</label>
              <select class="form-select" name="role">
                <option value="employee" data-i18n="Employee">Employee</option>
                <option value="admin" data-i18n="Admin">Admin</option>
              </select>
            </div>
          </div>
          <button class="btn btn-primary btn-block btn-lg" type="submit" data-i18n="Add employee">Add employee</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Detail modal -->
  <div class="modal-overlay" id="detail-modal">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-body" id="detail-body"></div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/ui.js"></script>
  <script>
    const ctx = UI.requireAuth();
    if (ctx) {
      if (ctx.user.role !== 'admin') {
        window.location.href = 'dashboard.html';
      } else {
        UI.renderHeader('Employees', {
          action: `<button class="icon-btn primary" onclick="openAdd()">+</button>`
        });

        let searchQ = '';

        function render() {
          const root = document.getElementById('root');
          const users = DB.getUsersByCompany(ctx.company.id);
          const today = new Date().toISOString().slice(0, 10);

          const filtered = searchQ
            ? users.filter(u => (u.name + ' ' + u.email + ' ' + (u.position || '')).toLowerCase().includes(searchQ.toLowerCase()))
            : users;

          let html = `
            <div class="form-group">
              <input class="form-input" type="search" id="search" placeholder="${I18N.t('Search employees')}" value="${escapeHtml(searchQ)}">
            </div>

            <div class="stat-grid" style="grid-template-columns: repeat(2, 1fr);">
              <div class="stat-card blue">
                <div class="icon-wrap">👥</div>
                <div class="stat-label" data-i18n="Total employees">Total employees</div>
                <div class="stat-value">${users.length}</div>
              </div>
              <div class="stat-card green">
                <div class="icon-wrap">✓</div>
                <div class="stat-label" data-i18n="In today">In today</div>
                <div class="stat-value">${DB.getCheckinsByCompany(ctx.company.id).filter(c => c.date === today).length}</div>
              </div>
            </div>

            <div class="card">
              <div class="card-header">
                <div class="card-title">${filtered.length} ${I18N.t('Employees')}</div>
              </div>
              ${filtered.length === 0 ? `
                <div class="empty">
                  <div class="icon">👥</div>
                  <div class="title" data-i18n="No employees yet">No employees yet</div>
                </div>
              ` : filtered.map(u => {
                const ci = DB.getTodayCheckin(u.id);
                const onLeave = DB.getLeavesByUser(u.id).some(l =>
                  l.status === 'approved' && l.startDate <= today && l.endDate >= today
                );
                let status = '';
                if (onLeave) status = '<span class="badge badge-cyan" data-i18n="On leave">' + I18N.t('On leave') + '</span>';
                else if (ci && !ci.checkOutAt) status = `<span class="badge badge-success" data-i18n="Working">${I18N.t('Working')}</span>${ci.lateMinutes > 0 ? ` <span class="badge badge-warning">${ci.lateMinutes}m</span>` : ''}`;
                else if (ci && ci.checkOutAt) status = '<span class="badge badge-gray" data-i18n="Checked out">' + I18N.t('Checked out') + '</span>';
                else status = '<span class="badge badge-gray" data-i18n="Not checked in">' + I18N.t('Not checked in') + '</span>';

                return `
                  <div class="list-item" data-user-id="${u.id}" style="cursor: pointer;">
                    ${UI.avatarEl(u)}
                    <div class="list-item-main">
                      <div class="list-item-title">${escapeHtml(u.name)}${u.role === 'admin' ? ' <span class="badge badge-primary" style="font-size: 10px;">' + I18N.t('Admin') + '</span>' : ''}</div>
                      <div class="list-item-sub">${escapeHtml(u.position || u.email)}</div>
                    </div>
                    ${status}
                  </div>
                `;
              }).join('')}
            </div>
          `;

          root.innerHTML = html;

          document.getElementById('search').addEventListener('input', e => {
            searchQ = e.target.value;
            // Just re-render list, don't refocus
            const scroll = window.scrollY;
            render();
            window.scrollTo(0, scroll);
            document.getElementById('search').focus();
          });

          root.querySelectorAll('[data-user-id]').forEach(el => {
            el.addEventListener('click', () => showDetail(el.dataset.userId));
          });

          I18N.apply();
        }

        function showDetail(id) {
          const u = DB.getUser(id);
          if (!u) return;
          const balance = DB.getLeaveBalance(id);
          const checkins = DB.getCheckinsByUser(id).slice(-30);
          const lateCount = checkins.filter(c => c.lateMinutes > 0).length;
          const isEmployee = u.role === 'employee';

          const body = document.getElementById('detail-body');
          body.innerHTML = `
            <div class="text-center" style="padding: 16px 0;">
              ${UI.avatarEl(u, 'xl')}
              <div style="font-size: 20px; font-weight: 700; margin-top: 12px;">${escapeHtml(u.name)}</div>
              <div class="text-muted text-sm">${escapeHtml(u.position || 'Employee')} ${u.department ? '· ' + escapeHtml(u.department) : ''}</div>
              <div class="text-muted text-xs mt-1">${escapeHtml(u.email)}</div>
              ${u.role === 'admin' ? `<span class="badge badge-primary mt-2" data-i18n="Admin">${I18N.t('Admin')}</span>` : ''}
            </div>

            <div class="text-center mb-3">
              <input type="file" id="pic-upload-${u.id}" accept="image/*" style="display: none;" onchange="uploadPic('${u.id}', this)">
              <div class="flex gap-2" style="justify-content: center;">
                <button class="btn btn-secondary btn-sm" onclick="document.getElementById('pic-upload-${u.id}').click()">📷 <span data-i18n="Change picture">Change picture</span></button>
                ${u.avatar ? `<button class="btn btn-secondary btn-sm" onclick="removePic('${u.id}')">🗑 <span data-i18n="Remove picture">Remove picture</span></button>` : ''}
              </div>
            </div>

            ${isEmployee ? `
              <div class="card" style="background: var(--primary-light); border-color: transparent; padding: 14px; margin-bottom: 14px;">
                <div class="card-title mb-2" style="color: var(--primary);" data-i18n="Login details">Login details</div>
                <div class="text-xs text-muted mb-3"><b>${escapeHtml(ctx.company.joinCode)}</b> + <span data-i18n="Employee Code">Employee Code</span> = login</div>

                <label class="form-label text-xs" data-i18n="Company code">Company code</label>
                <div class="flex items-center gap-2 mb-3">
                  <input class="form-input" value="${escapeHtml(ctx.company.joinCode)}" readonly style="font-family: monospace; font-weight: 700;">
                  <button class="btn btn-secondary btn-sm" onclick="copyText('${escapeHtml(ctx.company.joinCode)}')" data-i18n="Copy">Copy</button>
                </div>

                <label class="form-label text-xs" data-i18n="Employee Code">Employee Code</label>
                <div class="flex items-center gap-2">
                  <input class="form-input" value="${escapeHtml(u.password)}" readonly style="font-family: monospace; font-weight: 700; letter-spacing: 1px;">
                  <button class="btn btn-secondary btn-sm" onclick="copyText('${escapeHtml(u.password)}')" data-i18n="Copy">Copy</button>
                </div>

                <label class="form-label text-xs mt-3" data-i18n="Email">Email</label>
                <div class="flex items-center gap-2">
                  <input class="form-input" value="${escapeHtml(u.email)}" readonly>
                  <button class="btn btn-secondary btn-sm" onclick="copyText('${escapeHtml(u.email)}')" data-i18n="Copy">Copy</button>
                </div>

                <button class="btn btn-ghost btn-sm mt-2" onclick="resetCode('${u.id}')" style="width: 100%;">🔄 <span data-i18n="Reset code">Reset code</span></button>
              </div>
            ` : ''}

            <div class="section-title" data-i18n="Leave balance">Leave balance</div>
            <div class="stat-grid">
              ${['annual', 'sick', 'personal', 'emergency'].map(type => {
                const b = balance[type];
                const colors = { annual: 'blue', sick: 'red', personal: 'cyan', emergency: 'amber' };
                const labels = { annual: 'Annual leave', sick: 'Sick leave', personal: 'Personal leave', emergency: 'Emergency leave' };
                return `
                  <div class="stat-card ${colors[type]}">
                    <div class="stat-label" data-i18n="${labels[type]}">${I18N.t(labels[type])}</div>
                    <div class="stat-value">${b.total - b.used}</div>
                    <div class="stat-sub">${b.used} / ${b.total}</div>
                  </div>
                `;
              }).join('')}
            </div>

            <div class="section-title">${I18N.t('Attendance')} (30 ${I18N.t('days')})</div>
            <div class="stat-grid" style="grid-template-columns: repeat(2, 1fr);">
              <div class="stat-card green">
                <div class="stat-label">${I18N.t('Checked out')}</div>
                <div class="stat-value">${checkins.length}</div>
              </div>
              <div class="stat-card amber">
                <div class="stat-label">${I18N.t('Late')}</div>
                <div class="stat-value">${lateCount}</div>
              </div>
            </div>

            ${u.id !== ctx.user.id ? `
              <button class="btn btn-danger btn-block mt-3" onclick="deleteUser('${u.id}')" data-i18n="Delete">Delete</button>
            ` : ''}
          `;
          UI.openModal('detail-modal');
        }

        window.deleteUser = function(id) {
          UI.confirm(I18N.t('Remove this employee?'), () => {
            DB.deleteUser(id);
            UI.closeModal('detail-modal');
            UI.toast(I18N.t('Removed'), 'success');
            render();
          });
        };

        window.copyText = function(txt) {
          try {
            navigator.clipboard.writeText(txt);
            UI.toast(I18N.t('Copied!'), 'success');
          } catch (e) { UI.toast(I18N.t('Copied!'), 'success'); }
        };

        window.resetCode = function(id) {
          const u = DB.getUser(id);
          if (!u) return;
          // Generate a unique code in this company
          let newCode;
          for (let i = 0; i < 20; i++) {
            newCode = 'EMP' + Math.random().toString(36).slice(2, 6).toUpperCase();
            if (DB.isCodeUnique(ctx.company.id, newCode, u.id)) break;
          }
          UI.confirm(I18N.t('Reset code') + '?\n\n' + I18N.t('New code') + ': ' + newCode, () => {
            u.password = newCode;
            DB.saveUser(u);
            UI.toast(I18N.t('Code reset') + ': ' + newCode, 'success');
            showDetail(id);
          });
        };

        window.uploadPic = function(id, input) {
          const file = input.files && input.files[0];
          if (!file) return;
          if (file.size > 5 * 1024 * 1024) {
            UI.toast(I18N.t('Picture too large'), 'error'); return;
          }
          DB.resizeImageFile(file, 280, dataUrl => {
            if (!dataUrl) { UI.toast(I18N.t('Picture too large'), 'error'); return; }
            const u = DB.getUser(id);
            if (!u) return;
            u.avatar = dataUrl;
            DB.saveUser(u);
            UI.toast(I18N.t('Picture updated'), 'success');
            showDetail(id);
            render();
          });
        };

        window.removePic = function(id) {
          const u = DB.getUser(id);
          if (!u) return;
          delete u.avatar;
          DB.saveUser(u);
          UI.toast(I18N.t('Picture updated'), 'success');
          showDetail(id);
          render();
        };

        function nextEmployeeCode() {
          // Generate a clean sequential-ish code based on existing employees
          const existing = DB.getUsersByCompany(ctx.company.id)
            .filter(u => /^EMP\d+$/i.test(u.password || ''))
            .map(u => Number(u.password.replace(/^EMP/i, '')));
          const next = (existing.length ? Math.max(...existing) : 0) + 1;
          return 'EMP' + String(next).padStart(3, '0');
        }

        window.openAdd = function() {
          document.getElementById('join-code-display').value = ctx.company.joinCode;
          // Auto-suggest a clean code
          const codeField = document.querySelector('#add-form [name=password]');
          if (codeField && !codeField.value) codeField.value = nextEmployeeCode();
          UI.openModal('add-modal');
        };

        window.copyCode = function() {
          const inp = document.getElementById('join-code-display');
          inp.select();
          inp.setSelectionRange(0, 999);
          try {
            navigator.clipboard.writeText(ctx.company.joinCode);
            UI.toast(I18N.t('Copied!'), 'success');
          } catch (e) {
            document.execCommand('copy');
            UI.toast(I18N.t('Copied!'), 'success');
          }
        };

        document.getElementById('add-form').addEventListener('submit', e => {
          e.preventDefault();
          const fd = new FormData(e.target);
          const email = fd.get('email').trim().toLowerCase();
          const code = (fd.get('password') || '').trim().toUpperCase();
          if (DB.getUserByEmail(email)) {
            UI.toast(I18N.t('Email already exists'), 'error'); return;
          }
          if (!DB.isCodeUnique(ctx.company.id, code)) {
            UI.toast(I18N.t('This code is already used by another employee'), 'error'); return;
          }
          DB.createUser({
            companyId: ctx.company.id,
            email,
            password: code,
            name: fd.get('name').trim(),
            role: fd.get('role'),
            position: fd.get('position'),
            department: fd.get('department'),
            phone: fd.get('phone')
          });
          UI.toast(I18N.t('Added'), 'success');
          UI.closeModal('add-modal');
          e.target.reset();
          render();
        });

        document.querySelectorAll('.modal-overlay').forEach(m => {
          m.addEventListener('click', e => {
            if (e.target === m) m.classList.remove('active');
          });
        });

        function escapeHtml(s) {
          return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
        }

        render();
        UI.renderBottomNav('employees', ctx.user.role);
        I18N.injectToggle();
      }
    }
  </script>
</body>
</html>
