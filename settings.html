<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#3B4FCA">
  <title>TeamPulse — Settings</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body class="app">
  <main class="container" id="root"></main>

  <!-- Shift modal -->
  <div class="modal-overlay" id="shift-modal">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <div class="modal-title" id="shift-modal-title">Add shift</div>
        <button class="icon-btn" onclick="UI.closeModal('shift-modal')">✕</button>
      </div>
      <div class="modal-body">
        <form id="shift-form">
          <div class="form-group">
            <label class="form-label" data-i18n="Shift name">Shift name</label>
            <input class="form-input" type="text" name="name" required placeholder="Morning shift">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" data-i18n="Start time">Start time</label>
              <input class="form-input" type="time" name="start" required>
            </div>
            <div class="form-group">
              <label class="form-label" data-i18n="End time">End time</label>
              <input class="form-input" type="time" name="end" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Color</label>
            <input class="form-input" type="color" name="color" value="#3B4FCA" style="height: 46px; padding: 4px;">
          </div>
          <button class="btn btn-primary btn-block btn-lg" type="submit" data-i18n="Save">Save</button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/data.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/ui.js"></script>
  <script>
    const ctx = UI.requireAuth();
    if (ctx) {
      if (ctx.user.role !== 'admin') {
        window.location.href = 'dashboard.html';
      } else {
        UI.renderHeader('Company Settings', { subtitle: ctx.company.name });

        function render() {
          const root = document.getElementById('root');
          const c = DB.getCompany(ctx.company.id);

          // Trial days remaining
          let trialDays = 0;
          if (c.trialEndsAt) {
            trialDays = Math.max(0, Math.ceil((new Date(c.trialEndsAt) - Date.now()) / 86400000));
          }

          root.innerHTML = `
            <!-- Subscription card -->
            <div class="hero-card">
              <div class="greeting" data-i18n="Current plan">Current plan</div>
              <div class="name" style="text-transform: capitalize;">${c.plan}</div>
              ${c.plan === 'trial' ? `<div class="text-sm" style="opacity: 0.95;"><span data-i18n="Trial ends in">Trial ends in</span> <b>${trialDays}</b> ${I18N.t('days')}</div>` : ''}
              <button class="btn btn-block mt-3" style="background: white; color: var(--primary); margin-top: 14px;" onclick="upgradePlan()">
                ⚡ <span data-i18n="Upgrade">Upgrade</span>
              </button>
            </div>

            <!-- Join code -->
            <div class="card">
              <div class="card-title mb-2" data-i18n="Share join code">Share join code</div>
              <div class="text-sm text-muted mb-3" data-i18n="Send this code to your team to let them join">Send this code to your team to let them join</div>
              <div class="flex items-center gap-2">
                <input class="form-input" id="code" value="${c.joinCode}" readonly style="font-family: monospace; text-align: center; font-weight: 800; font-size: 18px; letter-spacing: 3px;">
                <button class="btn btn-primary btn-sm" onclick="copy()" data-i18n="Copy">Copy</button>
              </div>
            </div>

            <!-- Company info -->
            <form id="company-form" class="card">
              <div class="card-title mb-2" data-i18n="Company">Company</div>
              <div class="form-group">
                <label class="form-label" data-i18n="Company Name">Company Name</label>
                <input class="form-input" type="text" name="name" value="${escapeHtml(c.name)}" required>
              </div>

              <div class="card-title mb-2 mt-3" data-i18n="Work hours">Work hours</div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" data-i18n="Work start">Work start</label>
                  <input class="form-input" type="time" name="workStart" value="${c.workStart}">
                </div>
                <div class="form-group">
                  <label class="form-label" data-i18n="Work end">Work end</label>
                  <input class="form-input" type="time" name="workEnd" value="${c.workEnd}">
                </div>
              </div>
              <div class="form-group">
                <label class="form-label" data-i18n="Late grace period (min)">Late grace period (min)</label>
                <input class="form-input" type="number" name="lateGraceMinutes" value="${c.lateGraceMinutes || 0}" min="0" max="60">
              </div>
            </form>

            <!-- Shifts -->
            <div class="card">
              <div class="card-header">
                <div>
                  <div class="card-title" data-i18n="Shifts">Shifts</div>
                  <div class="text-xs text-muted mt-1" data-i18n="Add shifts to let employees pick when they check in">Add shifts to let employees pick when they check in</div>
                </div>
                <button class="icon-btn primary" onclick="openShiftModal()">+</button>
              </div>
              <div id="shifts-list"></div>
              ${(c.shifts || []).length === 0 ? `
                <button class="btn btn-secondary btn-block btn-sm mt-2" onclick="seedDefaultShifts()" data-i18n="Add default shifts">Add default shifts</button>
              ` : ''}
            </div>

            <form id="company-form-2" class="card">
              <div class="card-title mb-2" data-i18n="Office location">Office location</div>
              <div class="text-xs text-muted mb-2" data-i18n="Drag the pin or tap the map to set the office location">${I18N.t('Drag the pin or tap the map to set the office location')}</div>
              <div id="map-picker" style="height: 240px; border-radius: 12px; overflow: hidden; margin-bottom: 14px; border: 1px solid var(--border);"></div>
              <input type="hidden" name="officeLat" id="hidden-lat" value="${c.officeLat}">
              <input type="hidden" name="officeLng" id="hidden-lng" value="${c.officeLng}">
              <div class="form-group">
                <label class="form-label" style="display:flex;justify-content:space-between;align-items:center;">
                  <span data-i18n="Allowed radius (m)">Allowed radius (m)</span>
                  <span id="radius-display" style="font-weight:700;color:var(--primary);">${c.officeRadiusM}m</span>
                </label>
                <input type="range" name="officeRadiusM" id="radius-slider" value="${c.officeRadiusM}" min="20" max="2000" step="10"
                       style="width:100%;accent-color:var(--primary);cursor:pointer;margin:6px 0;" oninput="updateRadius(this.value)">
                <div style="display:flex;justify-content:space-between;">
                  <span class="text-xs text-muted">20m</span>
                  <span class="text-xs text-muted">2,000m</span>
                </div>
              </div>
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                <span class="text-xs text-muted" id="map-coords-display">${c.officeLat.toFixed(4)}°N, ${c.officeLng.toFixed(4)}°E</span>
                <button class="btn btn-secondary btn-sm" type="button" onclick="useMyLocation()">📍 <span data-i18n="Use my current location">${I18N.t('Use my current location')}</span></button>
              </div>

              <div class="card-title mb-2 mt-3" data-i18n="Allowed check-in methods">Allowed check-in methods</div>
              <div class="setting-row">
                <div class="info">
                  <div class="label" data-i18n="Allow GPS check-in">Allow GPS check-in</div>
                </div>
                <label class="switch">
                  <input type="checkbox" name="gps" ${c.checkInMethods.includes('gps') ? 'checked' : ''}>
                  <span class="slider"></span>
                </label>
              </div>
              <div class="setting-row">
                <div class="info">
                  <div class="label" data-i18n="Allow QR check-in">Allow QR check-in</div>
                </div>
                <label class="switch">
                  <input type="checkbox" name="qr" ${c.checkInMethods.includes('qr') ? 'checked' : ''}>
                  <span class="slider"></span>
                </label>
              </div>

              <div class="card-title mb-2 mt-3" data-i18n="Leave defaults (days/year)">Leave defaults (days/year)</div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" data-i18n="Annual leave">Annual leave</label>
                  <input class="form-input" type="number" name="annualLeaveDefault" value="${c.annualLeaveDefault}" min="0" max="60">
                </div>
                <div class="form-group">
                  <label class="form-label" data-i18n="Sick leave">Sick leave</label>
                  <input class="form-input" type="number" name="sickLeaveDefault" value="${c.sickLeaveDefault}" min="0" max="60">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" data-i18n="Personal leave">Personal leave</label>
                  <input class="form-input" type="number" name="personalLeaveDefault" value="${c.personalLeaveDefault}" min="0" max="60">
                </div>
                <div class="form-group">
                  <label class="form-label" data-i18n="Emergency leave">Emergency leave</label>
                  <input class="form-input" type="number" name="emergencyLeaveDefault" value="${c.emergencyLeaveDefault}" min="0" max="60">
                </div>
              </div>

              <button class="btn btn-primary btn-block btn-lg mt-3" type="submit" data-i18n="Save">Save</button>
            </form>

            <!-- About -->
            <div class="card">
              <div class="card-title mb-2" data-i18n="About">About</div>
              <div class="setting-row">
                <div class="info"><div class="label">Version</div></div>
                <div class="text-sm text-muted">1.0.0</div>
              </div>
              <div class="setting-row">
                <div class="info"><div class="label">Created</div></div>
                <div class="text-sm text-muted">${DB.formatDate(c.createdAt)}</div>
              </div>
            </div>

            <!-- Backup -->
            <div class="card">
              <div class="card-title mb-2" data-i18n="Backup & restore">Backup & restore</div>
              <div class="text-sm text-muted mb-3" data-i18n="Export all data as a JSON file. Import on another browser to transfer everything.">Export all data as a JSON file. Import on another browser to transfer everything.</div>
              <div class="flex gap-2">
                <button class="btn btn-secondary flex-1" onclick="exportData()">⬇ <span data-i18n="Export">Export</span></button>
                <button class="btn btn-secondary flex-1" onclick="document.getElementById('import-file').click()">⬆ <span data-i18n="Import">Import</span></button>
                <input type="file" id="import-file" accept=".json" style="display: none;" onchange="importData(this)">
              </div>
            </div>

            <!-- Danger zone -->
            <div class="card" style="border-color: var(--danger-light);">
              <div class="card-title mb-2" style="color: var(--danger);" data-i18n="Danger zone">Danger zone</div>
              <div class="text-sm text-muted mb-3" data-i18n="This will delete all companies, users, leaves, and check-ins from this device. This cannot be undone.">This will delete all companies, users, leaves, and check-ins from this device. This cannot be undone.</div>
              <button class="btn btn-danger btn-block" onclick="resetAll()" data-i18n="Reset all data">Reset all data</button>
            </div>
          `;

          document.getElementById('company-form').addEventListener('submit', save);
          document.getElementById('company-form-2').addEventListener('submit', save);
          renderShifts();
          I18N.apply();
          setTimeout(initMapPicker, 0);
        }

        // Read a value from any form in the page
        function val(name) {
          const el = document.querySelector(`[name="${name}"]`);
          if (!el) return '';
          if (el.type === 'checkbox') return el.checked ? 'on' : '';
          return el.value;
        }

        function save(e) {
          e.preventDefault();
          const c = DB.getCompany(ctx.company.id);
          c.name = val('name').trim();
          c.workStart = val('workStart');
          c.workEnd = val('workEnd');
          c.lateGraceMinutes = Number(val('lateGraceMinutes')) || 0;
          c.officeLat = Number(val('officeLat'));
          c.officeLng = Number(val('officeLng'));
          c.officeRadiusM = Number(val('officeRadiusM'));
          c.annualLeaveDefault = Number(val('annualLeaveDefault'));
          c.sickLeaveDefault = Number(val('sickLeaveDefault'));
          c.personalLeaveDefault = Number(val('personalLeaveDefault'));
          c.emergencyLeaveDefault = Number(val('emergencyLeaveDefault'));
          const methods = [];
          if (val('gps')) methods.push('gps');
          if (val('qr')) methods.push('qr');
          c.checkInMethods = methods.length > 0 ? methods : ['gps'];
          DB.saveCompany(c);
          UI.toast(I18N.t('Settings saved'), 'success');
        }

        // ===== Shifts =====
        function renderShifts() {
          const c = DB.getCompany(ctx.company.id);
          const shifts = c.shifts || [];
          const el = document.getElementById('shifts-list');
          if (!el) return;
          if (shifts.length === 0) {
            el.innerHTML = `<div class="empty" style="padding: 20px 10px;">
              <div class="icon" style="font-size: 32px;">🕒</div>
              <div class="title" data-i18n="No shifts yet">${I18N.t('No shifts yet')}</div>
            </div>`;
            return;
          }
          el.innerHTML = shifts.map(s => `
            <div class="list-item">
              <div class="avatar sm" style="background: ${s.color || 'var(--primary)'};">🕒</div>
              <div class="list-item-main">
                <div class="list-item-title">${escapeHtml(s.name)}</div>
                <div class="list-item-sub">${s.start} – ${s.end}</div>
              </div>
              <button class="icon-btn" onclick="editShift('${s.id}')" style="width: 34px; height: 34px;">✏️</button>
              <button class="icon-btn" onclick="deleteShift('${s.id}')" style="width: 34px; height: 34px;">🗑</button>
            </div>
          `).join('');
        }

        window.openShiftModal = function(shiftId) {
          const c = DB.getCompany(ctx.company.id);
          const editing = shiftId ? (c.shifts || []).find(s => s.id === shiftId) : null;
          UI.openModal('shift-modal');
          const f = document.getElementById('shift-form');
          f.dataset.editId = shiftId || '';
          f.name.value = editing ? editing.name : '';
          f.start.value = editing ? editing.start : '09:00';
          f.end.value = editing ? editing.end : '18:00';
          f.color.value = editing ? (editing.color || '#3B4FCA') : '#3B4FCA';
          document.getElementById('shift-modal-title').textContent =
            editing ? I18N.t('Edit shift') : I18N.t('Add shift');
        };

        window.editShift = function(id) { openShiftModal(id); };

        window.deleteShift = function(id) {
          UI.confirm(I18N.t('Remove this shift?'), () => {
            const c = DB.getCompany(ctx.company.id);
            c.shifts = (c.shifts || []).filter(s => s.id !== id);
            DB.saveCompany(c);
            renderShifts();
            UI.toast(I18N.t('Removed'), 'success');
          });
        };

        window.seedDefaultShifts = function() {
          const c = DB.getCompany(ctx.company.id);
          c.shifts = [
            { id: DB.uid('sh'), name: I18N.t('Morning shift'), start: '06:00', end: '14:00', color: '#0EA5E9' },
            { id: DB.uid('sh'), name: I18N.t('Afternoon shift'), start: '14:00', end: '22:00', color: '#F59E0B' },
            { id: DB.uid('sh'), name: I18N.t('Night shift'), start: '22:00', end: '06:00', color: '#8B5CF6' }
          ];
          DB.saveCompany(c);
          render();
          UI.toast(I18N.t('Added'), 'success');
        };

        window.copy = function() {
          const inp = document.getElementById('code');
          inp.select();
          try {
            navigator.clipboard.writeText(ctx.company.joinCode);
            UI.toast(I18N.t('Copied!'), 'success');
          } catch (e) {
            document.execCommand('copy');
            UI.toast(I18N.t('Copied!'), 'success');
          }
        };

        window.useMyLocation = function() {
          if (!navigator.geolocation) { UI.toast(I18N.t('GPS not available'), 'error'); return; }
          UI.toast(I18N.t('Getting location...'));
          navigator.geolocation.getCurrentPosition(pos => {
            const { latitude, longitude } = pos.coords;
            const hidLat = document.getElementById('hidden-lat');
            const hidLng = document.getElementById('hidden-lng');
            const dispEl = document.getElementById('map-coords-display');
            if (hidLat) hidLat.value = latitude.toFixed(6);
            if (hidLng) hidLng.value = longitude.toFixed(6);
            if (dispEl) dispEl.textContent = latitude.toFixed(4) + '°N, ' + longitude.toFixed(4) + '°E';
            if (_sMarker && _sMap && _sCircle) {
              const ll = L.latLng(latitude, longitude);
              _sMarker.setLatLng(ll);
              _sCircle.setLatLng(ll);
              _sMap.setView(ll, 16);
            }
            UI.toast(I18N.t('Location set'), 'success');
          }, () => UI.toast(I18N.t('Location not available'), 'error'), { enableHighAccuracy: true, timeout: 10000 });
        };

        window.upgradePlan = function() {
          UI.confirm('In the demo, plans are simulated. Upgrade to Pro?', () => {
            const c = DB.getCompany(ctx.company.id);
            c.plan = 'pro';
            c.trialEndsAt = null;
            DB.saveCompany(c);
            UI.toast('Upgraded to Pro!', 'success');
            render();
          });
        };

        // Shift form submit
        document.getElementById('shift-form').addEventListener('submit', e => {
          e.preventDefault();
          const f = e.target;
          const editId = f.dataset.editId;
          const c = DB.getCompany(ctx.company.id);
          c.shifts = c.shifts || [];
          const data = {
            name: f.name.value.trim(),
            start: f.start.value,
            end: f.end.value,
            color: f.color.value
          };
          if (editId) {
            const i = c.shifts.findIndex(s => s.id === editId);
            if (i >= 0) c.shifts[i] = { ...c.shifts[i], ...data };
          } else {
            c.shifts.push({ id: DB.uid('sh'), ...data });
          }
          DB.saveCompany(c);
          UI.closeModal('shift-modal');
          render();
          UI.toast(I18N.t('Settings saved'), 'success');
        });

        // Close modal on overlay click
        document.querySelectorAll('.modal-overlay').forEach(m => {
          m.addEventListener('click', e => {
            if (e.target === m) m.classList.remove('active');
          });
        });

        window.exportData = function() {
          const payload = DB.exportAll();
          const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          const safeName = (ctx.company.name || 'teampulse').replace(/[^A-Za-z0-9_-]/g, '_');
          a.href = url;
          a.download = `teampulse-${safeName}-${new Date().toISOString().slice(0, 10)}.json`;
          a.click();
          URL.revokeObjectURL(url);
          UI.toast('Exported', 'success');
        };

        window.importData = function(input) {
          const file = input.files && input.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = e => {
            try {
              const payload = JSON.parse(e.target.result);
              const msg = I18N.lang === 'th'
                ? 'การ import จะเขียนทับข้อมูลเดิมทั้งหมดใน browser นี้ ดำเนินการต่อ?'
                : 'Import will overwrite all current data in this browser. Continue?';
              if (!confirm(msg)) { input.value = ''; return; }
              DB.importAll(payload);
              UI.toast('Imported — reloading...', 'success');
              setTimeout(() => location.reload(), 600);
            } catch (err) {
              UI.toast('Invalid backup file: ' + err.message, 'error');
            }
            input.value = '';
          };
          reader.readAsText(file);
        };

        window.resetAll = function() {
          UI.confirm(I18N.t('This will delete all companies, users, leaves, and check-ins from this device. This cannot be undone.'), () => {
            Object.values(DB.K).forEach(k => localStorage.removeItem(k));
            window.location.href = 'index.html';
          });
        };

        function escapeHtml(s) {
          return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
        }

        // ===== Map picker =====
        let _sMap = null, _sMarker = null, _sCircle = null;

        function initMapPicker() {
          const el = document.getElementById('map-picker');
          if (!el || typeof L === 'undefined') return;
          if (_sMap) { _sMap.remove(); _sMap = null; }
          const c = DB.getCompany(ctx.company.id);
          const lat = c.officeLat || 13.7563;
          const lng = c.officeLng || 100.5018;
          const radius = c.officeRadiusM || 200;

          _sMap = L.map('map-picker', { zoomControl: true, scrollWheelZoom: false }).setView([lat, lng], 16);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
            maxZoom: 19
          }).addTo(_sMap);

          const offIcon = L.divIcon({
            className: '',
            html: '<div style="background:#3B4FCA;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 2px 8px rgba(59,79,202,.45);border:3px solid #fff;">🏢</div>',
            iconSize: [30, 30], iconAnchor: [15, 15]
          });
          _sMarker = L.marker([lat, lng], { draggable: true, icon: offIcon }).addTo(_sMap);
          _sCircle = L.circle([lat, lng], {
            radius, color: '#3B4FCA', fillColor: '#3B4FCA', fillOpacity: 0.1, weight: 2, dashArray: '5 5'
          }).addTo(_sMap);

          function syncCoords(latlng) {
            const hidLat = document.getElementById('hidden-lat');
            const hidLng = document.getElementById('hidden-lng');
            const dispEl = document.getElementById('map-coords-display');
            if (hidLat) hidLat.value = latlng.lat.toFixed(6);
            if (hidLng) hidLng.value = latlng.lng.toFixed(6);
            if (dispEl) dispEl.textContent = latlng.lat.toFixed(4) + '°N, ' + latlng.lng.toFixed(4) + '°E';
          }
          _sMarker.on('dragend', () => { const p = _sMarker.getLatLng(); _sCircle.setLatLng(p); syncCoords(p); });
          _sMap.on('click', e => { _sMarker.setLatLng(e.latlng); _sCircle.setLatLng(e.latlng); syncCoords(e.latlng); });
          setTimeout(() => _sMap && _sMap.invalidateSize(), 100);
        }

        window.updateRadius = function(v) {
          const n = Number(v);
          const disp = document.getElementById('radius-display');
          if (disp) disp.textContent = n + 'm';
          if (_sCircle) _sCircle.setRadius(n);
        };

        render();
        UI.renderBottomNav('profile', ctx.user.role);
        I18N.injectToggle();
      }
    }
  </script>
</body>
</html>
