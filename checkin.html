<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#3B4FCA">
  <title>TeamPulse — Check In</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body class="app">
  <main class="container" id="root"></main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/data.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/ui.js"></script>
  <script>
    const ctx = UI.requireAuth();
    if (ctx) {
      UI.renderHeader('Check In', { subtitle: 'Tap to check in' });

      const root = document.getElementById('root');

      let currentMethod = (ctx.company.checkInMethods && ctx.company.checkInMethods[0]) || 'gps';
      let currentShiftId = null;
      let gpsMapInstance = null;
      let _cachedPosition = null; // { latitude, longitude, ts }
      // Auto-pick the closest shift to now
      const _autoShift = DB.guessShiftForTime(ctx.company);
      if (_autoShift) currentShiftId = _autoShift.id;

      function render() {
        const todayCheckin = DB.getTodayCheckin(ctx.user.id);
        const isCheckedIn = todayCheckin && !todayCheckin.checkOutAt;
        const isDone = todayCheckin && todayCheckin.checkOutAt;
        const now = new Date();
        const nowStr = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });

        // Status of action
        let circleLabel, circleSub;
        if (isDone) {
          circleLabel = I18N.t('Checked out');
          circleSub = DB.formatTime(todayCheckin.checkOutAt);
        } else if (isCheckedIn) {
          circleLabel = I18N.t('Tap to check out');
          circleSub = nowStr;
        } else {
          circleLabel = I18N.t('Tap to check in');
          circleSub = nowStr;
        }

        const allowed = ctx.company.checkInMethods || ['gps', 'qr'];

        let html = `
          <div class="card text-center">
            <div class="text-sm text-muted mb-2">${new Date().toLocaleDateString(I18N.lang === 'th' ? 'th-TH' : 'en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div>
            <div class="checkin-circle ${isCheckedIn || isDone ? 'checked-in' : ''}" id="checkin-btn">
              <div class="label">${circleLabel}</div>
              <div class="time" id="clock">${circleSub}</div>
            </div>
            ${isDone ? `
              <div style="margin-top: 10px;">
                <div style="font-size: 13px; color: var(--text-2);" data-i18n="You are checked in">You are checked in</div>
                <div style="margin-top: 6px; font-size: 14px;">
                  <span data-i18n="Time in">Time in</span>: <b>${DB.formatTime(todayCheckin.checkInAt)}</b> ·
                  <span data-i18n="Time out">Time out</span>: <b>${DB.formatTime(todayCheckin.checkOutAt)}</b>
                </div>
                ${todayCheckin.lateMinutes > 0 ? `<span class="badge badge-warning" style="margin-top: 8px;"><span data-i18n="Late">Late</span> ${todayCheckin.lateMinutes} <span data-i18n="minutes">minutes</span></span>` : ''}
              </div>
            ` : ''}
          </div>

          ${!isDone ? `
            ${(ctx.company.shifts || []).length > 0 ? `
              <div class="card">
                <div class="card-header">
                  <div class="card-title" data-i18n="Select shift">Select shift</div>
                </div>
                <div class="method-pills" style="flex-wrap: wrap;">
                  ${(ctx.company.shifts || []).map(s => `
                    <button class="method-pill ${currentShiftId === s.id ? 'active' : ''}" data-shift="${s.id}" style="${currentShiftId === s.id ? 'background:' + (s.color || 'var(--primary)') + ';border-color:' + (s.color || 'var(--primary)') : ''}">
                      🕒 ${escapeHtml(s.name)} <span style="opacity: 0.8; font-weight: 500;">${s.start}–${s.end}</span>
                    </button>
                  `).join('')}
                </div>
              </div>
            ` : ''}

            <div class="card">
              <div class="card-header">
                <div class="card-title" data-i18n="Check-in method">Check-in method</div>
              </div>
              <div class="method-pills">
                ${allowed.includes('gps') ? `<button class="method-pill ${currentMethod === 'gps' ? 'active' : ''}" data-method="gps">📍 GPS</button>` : ''}
                ${allowed.includes('qr') ? `<button class="method-pill ${currentMethod === 'qr' ? 'active' : ''}" data-method="qr">📱 QR</button>` : ''}
                <button class="method-pill ${currentMethod === 'manual' ? 'active' : ''}" data-method="manual">✋ <span data-i18n="Manual">Manual</span></button>
              </div>
              <div id="method-content"></div>
            </div>
          ` : ''}

          <div class="card">
            <div class="card-header">
              <div class="card-title" data-i18n="Recent activity">Recent activity</div>
            </div>
            ${renderRecent()}
          </div>
        `;

        root.innerHTML = html;
        bindMethod();
        bindShift();
        bindCheckin();
        renderMethodContent();
        I18N.apply();
      }

      function bindShift() {
        document.querySelectorAll('[data-shift]').forEach(b => {
          b.addEventListener('click', () => {
            currentShiftId = b.dataset.shift;
            render();
          });
        });
      }

      function escapeHtml(s) {
        return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
      }

      function renderRecent() {
        const records = DB.getCheckinsByUser(ctx.user.id)
          .sort((a, b) => b.date.localeCompare(a.date))
          .slice(0, 5);
        if (records.length === 0) {
          return `<div class="empty"><div class="icon">🕐</div><div class="title" data-i18n="No activity yet">${I18N.t('No activity yet')}</div></div>`;
        }
        return records.map(c => {
          const shift = DB.getShift(ctx.company, c.shiftId);
          const shiftLabel = shift ? ' · ' + escapeHtml(shift.name) : '';
          return `
            <div class="list-item">
              <div class="avatar sm" style="background: ${c.lateMinutes > 0 ? 'var(--warning)' : 'var(--success)'};">${c.lateMinutes > 0 ? '⏰' : '✓'}</div>
              <div class="list-item-main">
                <div class="list-item-title">${DB.formatDate(c.date)}${shiftLabel}</div>
                <div class="list-item-sub">${DB.formatTime(c.checkInAt)} ${c.checkOutAt ? '→ ' + DB.formatTime(c.checkOutAt) : ''} · ${c.method.toUpperCase()}</div>
              </div>
              ${c.lateMinutes > 0
                ? `<span class="badge badge-warning"><span data-i18n="Late">${I18N.t('Late')}</span> ${c.lateMinutes}m</span>`
                : `<span class="badge badge-success" data-i18n="On time">${I18N.t('On time')}</span>`}
            </div>
          `;
        }).join('');
      }

      function bindMethod() {
        document.querySelectorAll('.method-pill').forEach(b => {
          b.addEventListener('click', () => {
            currentMethod = b.dataset.method;
            document.querySelectorAll('.method-pill').forEach(p => p.classList.remove('active'));
            b.classList.add('active');
            renderMethodContent();
          });
        });
      }

      function renderMethodContent() {
        // Destroy previous GPS map if any
        if (gpsMapInstance) { gpsMapInstance.remove(); gpsMapInstance = null; }
        const el = document.getElementById('method-content');
        if (!el) return;
        if (currentMethod === 'gps') {
          el.innerHTML = `
            <div id="gps-map" style="height:200px;border-radius:10px;overflow:hidden;margin:10px 0;border:1px solid var(--border);"></div>
            <div id="gps-status" class="text-sm text-center" style="margin:6px 0;min-height:22px;"></div>
          `;
          setTimeout(initCheckinMap, 0);
        } else if (currentMethod === 'qr') {
          el.innerHTML = `
            <div class="text-sm text-center text-muted mb-3" data-i18n="Scan this QR code at the office">${I18N.t('Scan this QR code at the office')}</div>
            <div class="form-group">
              <label class="form-label" data-i18n="Or enter code">Or enter code</label>
              <input class="form-input" type="text" id="qr-code" placeholder="${ctx.company.qrSecret}" style="text-transform: uppercase; text-align: center; letter-spacing: 4px; font-family: monospace; font-weight: 800;">
              <div class="form-help">Hint: ${ctx.company.qrSecret}</div>
            </div>
          `;
        } else {
          el.innerHTML = `
            <div class="text-sm text-center text-muted" style="margin: 14px 0;">
              Manual check-in records time without verification. Use only when other methods are unavailable.
            </div>
          `;
        }
        I18N.apply();
      }

      function bindCheckin() {
        const btn = document.getElementById('checkin-btn');
        if (!btn) return;
        const todayCheckin = DB.getTodayCheckin(ctx.user.id);
        const isCheckedIn = todayCheckin && !todayCheckin.checkOutAt;
        const isDone = todayCheckin && todayCheckin.checkOutAt;

        if (isDone) {
          btn.style.cursor = 'default';
          return;
        }

        btn.addEventListener('click', () => {
          if (isCheckedIn) {
            doCheckOut();
          } else {
            doCheckIn();
          }
        });
      }

      function doCheckIn() {
        if (currentMethod === 'gps') {
          checkInGPS();
        } else if (currentMethod === 'qr') {
          checkInQR();
        } else {
          performCheckIn('manual');
        }
      }

      function checkInGPS() {
        if (!navigator.geolocation) {
          UI.toast(I18N.t('Location not available'), 'error');
          return;
        }
        const doCheck = (latitude, longitude) => {
          const d = DB.haversine(latitude, longitude, ctx.company.officeLat, ctx.company.officeLng);
          if (d > ctx.company.officeRadiusM) {
            const statusEl = document.getElementById('gps-status');
            if (statusEl) statusEl.innerHTML = `<span style="color:var(--danger);font-weight:600;">✗ ${I18N.t('Outside office radius')}</span> · ${Math.round(d)}m`;
            UI.toast(I18N.t('You are not at the office location') + ' — ' + Math.round(d) + 'm', 'error');
            return;
          }
          performCheckIn('gps');
        };
        // Reuse cached location if fresh (< 30s) — map already fetched it
        if (_cachedPosition && (Date.now() - _cachedPosition.ts < 30000)) {
          doCheck(_cachedPosition.latitude, _cachedPosition.longitude);
          return;
        }
        const statusEl = document.getElementById('gps-status');
        if (statusEl) statusEl.textContent = I18N.t('Getting location...');
        navigator.geolocation.getCurrentPosition(pos => {
          _cachedPosition = { latitude: pos.coords.latitude, longitude: pos.coords.longitude, ts: Date.now() };
          doCheck(_cachedPosition.latitude, _cachedPosition.longitude);
        }, () => {
          if (statusEl) statusEl.textContent = I18N.t('Location not available');
          UI.toast(I18N.t('Location not available'), 'error');
        }, { enableHighAccuracy: true, timeout: 10000 });
      }

      function initCheckinMap() {
        const el = document.getElementById('gps-map');
        if (!el || typeof L === 'undefined') return;
        const offLat = ctx.company.officeLat;
        const offLng = ctx.company.officeLng;
        const radius = ctx.company.officeRadiusM;

        gpsMapInstance = L.map('gps-map', { zoomControl: false, scrollWheelZoom: false }).setView([offLat, offLng], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© <a href="https://www.openstreetmap.org/copyright">OSM</a>',
          maxZoom: 19
        }).addTo(gpsMapInstance);

        const offIcon = L.divIcon({
          className: '',
          html: '<div style="background:#3B4FCA;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 2px 8px rgba(59,79,202,.45);border:3px solid #fff;">🏢</div>',
          iconSize: [30, 30], iconAnchor: [15, 15]
        });
        L.marker([offLat, offLng], { icon: offIcon }).addTo(gpsMapInstance)
          .bindPopup(I18N.t('Office location'));

        const circle = L.circle([offLat, offLng], {
          radius, color: '#3B4FCA', fillColor: '#3B4FCA', fillOpacity: 0.08, weight: 2, dashArray: '5 5'
        }).addTo(gpsMapInstance);

        // Add zoom control bottom-right
        L.control.zoom({ position: 'bottomright' }).addTo(gpsMapInstance);

        const statusEl = document.getElementById('gps-status');
        if (statusEl) statusEl.textContent = I18N.t('Getting location...');

        if (!navigator.geolocation) {
          if (statusEl) statusEl.textContent = I18N.t('Location not available');
          return;
        }
        navigator.geolocation.getCurrentPosition(pos => {
          const { latitude, longitude } = pos.coords;
          _cachedPosition = { latitude, longitude, ts: Date.now() };
          const dist = Math.round(DB.haversine(latitude, longitude, offLat, offLng));
          const inside = dist <= radius;

          circle.setStyle({
            color: inside ? '#10B981' : '#EF4444',
            fillColor: inside ? '#10B981' : '#EF4444'
          });
          const uIcon = L.divIcon({
            className: '',
            html: `<div style="background:${inside ? '#10B981' : '#EF4444'};width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,.3);border:3px solid #fff;">${inside ? '✓' : '✗'}</div>`,
            iconSize: [26, 26], iconAnchor: [13, 13]
          });
          L.marker([latitude, longitude], { icon: uIcon }).addTo(gpsMapInstance)
            .bindPopup(I18N.t('You are here'));
          try {
            gpsMapInstance.fitBounds(
              L.latLngBounds([[offLat, offLng], [latitude, longitude]]).pad(0.4)
            );
          } catch(e) {}
          if (statusEl) {
            statusEl.innerHTML = inside
              ? `<span style="color:var(--success);font-weight:600;">✓ ${I18N.t('Inside office radius')}</span> · ${dist}m`
              : `<span style="color:var(--danger);font-weight:600;">✗ ${I18N.t('Outside office radius')}</span> · ${dist}m`;
          }
        }, () => {
          if (statusEl) statusEl.textContent = I18N.t('Location not available');
        }, { enableHighAccuracy: true, timeout: 10000 });
      }

      function checkInQR() {
        const input = document.getElementById('qr-code');
        const val = (input && input.value || '').trim().toUpperCase();
        if (!val || val !== ctx.company.qrSecret.toUpperCase()) {
          UI.toast(I18N.t('Invalid QR code'), 'error');
          return;
        }
        performCheckIn('qr');
      }

      function performCheckIn(method) {
        const now = new Date();
        const date = now.toISOString().slice(0, 10);
        const existing = DB.getTodayCheckin(ctx.user.id);
        if (existing && !existing.checkOutAt) {
          UI.toast(I18N.t('Already checked in today'), 'warning');
          return;
        }
        // Require shift selection if company uses shifts
        const shifts = ctx.company.shifts || [];
        if (shifts.length > 0 && !currentShiftId) {
          UI.toast(I18N.t('Please select a shift first'), 'error');
          return;
        }
        // Use shift's start time for late calc, otherwise company workStart
        const shift = DB.getShift(ctx.company, currentShiftId);
        const startTime = shift ? shift.start : ctx.company.workStart;
        const late = DB.calcLateMinutes(now.toISOString(), startTime, ctx.company.lateGraceMinutes);
        const ci = {
          id: DB.uid('ci'),
          companyId: ctx.company.id,
          userId: ctx.user.id,
          date,
          checkInAt: now.toISOString(),
          checkOutAt: null,
          method,
          shiftId: currentShiftId || null,
          lateMinutes: late,
          earlyLeaveMinutes: 0
        };
        DB.saveCheckin(ci);
        UI.toast(I18N.t('Check-in successful'), 'success');
        setTimeout(render, 400);
      }

      function doCheckOut() {
        const ci = DB.getTodayCheckin(ctx.user.id);
        if (!ci) return;
        ci.checkOutAt = new Date().toISOString();
        DB.saveCheckin(ci);
        UI.toast(I18N.t('Check-out successful'), 'success');
        setTimeout(render, 400);
      }

      render();
      UI.renderBottomNav('checkin', ctx.user.role);
      I18N.injectToggle();

      // Live clock update
      setInterval(() => {
        const todayCheckin = DB.getTodayCheckin(ctx.user.id);
        const isDone = todayCheckin && todayCheckin.checkOutAt;
        if (isDone) return;
        const el = document.getElementById('clock');
        if (el) el.textContent = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      }, 30000);
    }
  </script>
</body>
</html>
